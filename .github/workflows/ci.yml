name: CI Pipeline

on:
  pull_request:
    branches:
      - main
      - master

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Caché de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compilar proyecto
        run: mvn compile -DskipTests
        working-directory: DOSW-Library

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dosw_library
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Caché de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Ejecutar pruebas
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/dosw_library
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: admin
          SPRING_PROFILES_ACTIVE: relational
        run: mvn verify -Dspring.profiles.active=relational
        working-directory: DOSW-Library

      - name: Publicar resultados de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            DOSW-Library/target/surefire-reports/
            DOSW-Library/target/site/jacoco/

  analysis:
    name: Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Caché de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Descargar resultados de pruebas
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: DOSW-Library/target

      - name: Validación de calidad
        run: mvn checkstyle:check -Dcheckstyle.failOnViolation=false
        working-directory: DOSW-Library
        continue-on-error: true

      - name: Reporte de cobertura JaCoCo
        run: |
          if [ ! -f DOSW-Library/target/site/jacoco/index.html ]; then
            mvn jacoco:report -DskipTests
          fi

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: DOSW-Library/target/site/jacoco/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: En construcción
        run: echo "En construcción ..."
